<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="refresh" content="2">
    <title>Access Logs</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #f4f4f4;
        }

        .granted {
            color: green;
            font-weight: bold;
        }

        .denied {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2>Access Logs</h2>

<table>
    <tr>
        <th>ID</th>
        <th>UID</th>
        <th>Name</th>
        <th>Status</th>
        <th>Time</th>
    </tr>

    {% for log in logs %}
    <tr>
        <td>{{ log[0] }}</td>
        <td>{{ log[1] }}</td>
        <td>{{ log[2] }}</td>
        <td class="{{ log[3].lower() }}">
            {{ log[3] }}
        </td>
        <td>{{ log[4] }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
